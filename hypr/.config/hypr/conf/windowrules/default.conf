# -----------------------------------------------------
# Window rules (Hyprland 0.53+ syntax)
# -----------------------------------------------------

windowrule = match:title ^(pavucontrol)$, float on
windowrule = match:title ^(blueman-manager)$, float on
windowrule = match:title ^(nm-connection-editor)$, float on
windowrule = match:class ^(qalculate-gtk)$, float on

# Browser Picture in Picture
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, move 69.5% 4% on

# idleinhibit (now called idle_inhibit)
# Modes: none, always, focus, fullscreen
windowrule = match:class ([window]), match:fullscreen 1, idle_inhibit fullscreen
